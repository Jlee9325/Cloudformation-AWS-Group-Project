AWSTemplateFormatVersion: '2010-09-09'
Description: Mannys Card Shop - two-tier VPC

Parameters:
  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: Name of my EC2 key pair

Resources:

  MADJVPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: MADJ-VPC

  MADJPublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref MADJVPC
      CidrBlock: 10.0.1.0/24
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: MADJ-Public-Subnet

  MADJPrivateSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref MADJVPC
      CidrBlock: 10.0.2.0/24
      Tags:
        - Key: Name
          Value: MADJ-Private-Subnet

  MADJIGW:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: MADJ-IGW

  AttachGateway:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref MADJVPC
      InternetGatewayId: !Ref MADJIGW

  MADJPublicRT:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref MADJVPC
      Tags:
        - Key: Name
          Value: MADJ-Public-RT

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: AttachGateway
    Properties:
      RouteTableId: !Ref MADJPublicRT
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref MADJIGW

  PublicSubnetAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref MADJPublicSubnet
      RouteTableId: !Ref MADJPublicRT

  MADJPrivateRT:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref MADJVPC
      Tags:
        - Key: Name
          Value: MADJ-Private-RT

  PrivateSubnetAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref MADJPrivateSubnet
      RouteTableId: !Ref MADJPrivateRT

  MADJWebSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow HTTP and SSH
      VpcId: !Ref MADJVPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: MADJ-Web-SG

  MADJDBSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Only allow MySQL and SSH from web server
      VpcId: !Ref MADJVPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3306
          ToPort: 3306
          SourceSecurityGroupId: !Ref MADJWebSG
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          SourceSecurityGroupId: !Ref MADJWebSG
      Tags:
        - Key: Name
          Value: MADJ-DB-SG

  # Database EC2 in the private subnet (proves tier isolation)
  DatabaseServer:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: ami-0c02fb55956c7d316
      InstanceType: t2.micro
      KeyName: !Ref KeyName
      SubnetId: !Ref MADJPrivateSubnet
      SecurityGroupIds:
        - !Ref MADJDBSG
      UserData:
        Fn::Base64: |
          #!/bin/bash
          yum install -y mariadb-server
          systemctl enable mariadb
          systemctl start mariadb
      Tags:
        - Key: Name
          Value: DatabaseServer

  # Web server - runs Apache, PHP, and MariaDB for the card shop
  WebServer:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: ami-0c02fb55956c7d316
      InstanceType: t2.micro
      KeyName: !Ref KeyName
      SubnetId: !Ref MADJPublicSubnet
      SecurityGroupIds:
        - !Ref MADJWebSG
      UserData:
        Fn::Base64: |
          #!/bin/bash
          exec > /var/log/user-data.log 2>&1
          set -x

          yum update -y
          yum install -y httpd php php-mysqlnd mariadb-server

          systemctl enable mariadb
          systemctl start mariadb

          # Wait for MariaDB to actually be ready
          for i in {1..30}; do
            if mysqladmin ping --silent 2>/dev/null; then
              break
            fi
            sleep 2
          done

          mysql -u root <<'SQL'
          DELETE FROM mysql.user WHERE User='';
          DELETE FROM mysql.user WHERE User='root' AND Host NOT IN ('localhost', '127.0.0.1', '::1');
          DROP DATABASE IF EXISTS test;
          DELETE FROM mysql.db WHERE Db='test' OR Db='test\\_%';
          FLUSH PRIVILEGES;

          CREATE DATABASE IF NOT EXISTS MADJ_App_DB;
          USE MADJ_App_DB;
          CREATE TABLE IF NOT EXISTS cards (
            id INT AUTO_INCREMENT PRIMARY KEY,
            name VARCHAR(100),
            price DECIMAL(6,2)
          );
          INSERT INTO cards (name, price) VALUES
            ('Blue-Eyes White Dragon', 49.99),
            ('Charizard Holo', 129.99),
            ('Dark Magician', 39.99),
            ('Pikachu Promo', 19.99);

          DROP USER IF EXISTS 'MADJ_Web_User'@'localhost';
          DROP USER IF EXISTS 'MADJ_Web_User'@'127.0.0.1';
          CREATE USER 'MADJ_Web_User'@'localhost' IDENTIFIED BY 'Password123!';
          CREATE USER 'MADJ_Web_User'@'127.0.0.1' IDENTIFIED BY 'Password123!';
          GRANT ALL PRIVILEGES ON MADJ_App_DB.* TO 'MADJ_Web_User'@'localhost';
          GRANT ALL PRIVILEGES ON MADJ_App_DB.* TO 'MADJ_Web_User'@'127.0.0.1';
          FLUSH PRIVILEGES;
          SQL

          rm -f /etc/httpd/conf.d/welcome.conf
          rm -f /var/www/html/index.html

          cat > /var/www/html/index.php <<'PHPEOF'
          <?php
          error_reporting(E_ALL);
          ini_set('display_errors', 1);
          $conn = new mysqli("localhost", "MADJ_Web_User", "Password123!", "MADJ_App_DB");
          if ($conn->connect_error) {
              die("Connection failed: " . $conn->connect_error);
          }
          $result = $conn->query("SELECT * FROM cards");
          ?>
          <!DOCTYPE html>
          <html>
          <head>
              <title>Manny's Card Shop</title>
              <style>
                  body { font-family: Arial; background-color: #f4f4f4; text-align: center; }
                  h1 { background-color: #333; color: white; padding: 15px; }
                  table { margin: auto; border-collapse: collapse; width: 60%; background: white; }
                  th, td { padding: 10px; border: 1px solid #ccc; }
                  th { background-color: #555; color: white; }
              </style>
          </head>
          <body>
          <h1>Manny's Card Shop</h1>
          <table>
          <tr><th>Card Name</th><th>Price ($)</th></tr>
          <?php
          while ($row = $result->fetch_assoc()) {
              echo "<tr><td>{$row['name']}</td><td>{$row['price']}</td></tr>";
          }
          ?>
          </table>
          </body>
          </html>
          PHPEOF

          chown apache:apache /var/www/html/index.php
          chmod 644 /var/www/html/index.php

          systemctl enable httpd
          systemctl start httpd
      Tags:
        - Key: Name
          Value: WebServer

Outputs:
  WebServerURL:
    Description: Open this in a browser to see Manny's shop
    Value: !Sub http://${WebServer.PublicIp}
  DatabasePrivateIP:
    Description: Private IP of the database server (proves private subnet isolation)
    Value: !GetAtt DatabaseServer.PrivateIp