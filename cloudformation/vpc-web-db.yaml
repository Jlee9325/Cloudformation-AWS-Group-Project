AWSTemplateFormatVersion: '2010-09-09'
Description: Mannys Card Shop - two-tier VPC with signal-based readiness

Parameters:
  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: Name of my EC2 key pair

Resources:

  MADJVPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: MADJ-VPC

  MADJPublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref MADJVPC
      CidrBlock: 10.0.1.0/24
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: MADJ-Public-Subnet

  MADJPrivateSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref MADJVPC
      CidrBlock: 10.0.2.0/24
      Tags:
        - Key: Name
          Value: MADJ-Private-Subnet

  MADJIGW:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: MADJ-IGW

  AttachGateway:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref MADJVPC
      InternetGatewayId: !Ref MADJIGW

  MADJNatEIP:
    Type: AWS::EC2::EIP
    DependsOn: AttachGateway
    Properties:
      Domain: vpc

  MADJNAT:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt MADJNatEIP.AllocationId
      SubnetId: !Ref MADJPublicSubnet
      Tags:
        - Key: Name
          Value: MADJ-NAT

  MADJPublicRT:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref MADJVPC
      Tags:
        - Key: Name
          Value: MADJ-Public-RT

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: AttachGateway
    Properties:
      RouteTableId: !Ref MADJPublicRT
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref MADJIGW

  PublicSubnetAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref MADJPublicSubnet
      RouteTableId: !Ref MADJPublicRT

  MADJPrivateRT:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref MADJVPC
      Tags:
        - Key: Name
          Value: MADJ-Private-RT

  PrivateRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref MADJPrivateRT
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref MADJNAT

  PrivateSubnetAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref MADJPrivateSubnet
      RouteTableId: !Ref MADJPrivateRT

  MADJWebSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow HTTP and SSH
      VpcId: !Ref MADJVPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: MADJ-Web-SG

  MADJDBSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Only allow MySQL and SSH from web server
      VpcId: !Ref MADJVPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3306
          ToPort: 3306
          SourceSecurityGroupId: !Ref MADJWebSG
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          SourceSecurityGroupId: !Ref MADJWebSG
      Tags:
        - Key: Name
          Value: MADJ-DB-SG

  DatabaseServer:
    Type: AWS::EC2::Instance
    CreationPolicy:
      ResourceSignal:
        Timeout: PT15M
    Properties:
      ImageId: ami-0c02fb55956c7d316
      InstanceType: t2.micro
      KeyName: !Ref KeyName
      SubnetId: !Ref MADJPrivateSubnet
      SecurityGroupIds:
        - !Ref MADJDBSG
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          exec > /var/log/user-data.log 2>&1
          set -x

          yum update -y
          yum install -y mariadb-server

          # Kill any existing MariaDB config and write a known-good one
          rm -f /etc/my.cnf.d/*.cnf 2>/dev/null
          cat > /etc/my.cnf <<'EOF'
          [mysqld]
          datadir=/var/lib/mysql
          socket=/var/lib/mysql/mysql.sock
          user=mysql
          symbolic-links=0
          bind-address=0.0.0.0
          skip-name-resolve
          max_connect_errors=1000000
          max_connections=500

          [mysqld_safe]
          log-error=/var/log/mariadb/mariadb.log
          pid-file=/var/run/mariadb/mariadb.pid
          EOF

          systemctl enable mariadb
          systemctl start mariadb

          # Wait for mariadb to actually be ready
          for i in {1..60}; do
            if mysqladmin ping --silent 2>/dev/null; then
              break
            fi
            sleep 2
          done

          # Verify bind-address actually took effect. If not, force it.
          if ! ss -tlnp 2>/dev/null | grep -q '0.0.0.0:3306'; then
            echo "ERROR: bind-address did not apply, forcing restart"
            systemctl restart mariadb
            sleep 10
          fi

          # Build schema
          mysql -u root <<'SQL'
          DROP DATABASE IF EXISTS MADJ_App_DB;
          CREATE DATABASE MADJ_App_DB;
          USE MADJ_App_DB;
          CREATE TABLE cards (
            id INT AUTO_INCREMENT PRIMARY KEY,
            name VARCHAR(100),
            price DECIMAL(6,2)
          );
          INSERT INTO cards (name, price) VALUES
            ('Blue-Eyes White Dragon', 49.99),
            ('Charizard Holo', 129.99),
            ('Dark Magician', 39.99),
            ('Pikachu Promo', 19.99);
          SQL

          # Create the user and force-grant on % (all hosts in VPC)
          mysql -u root <<'SQL'
          DROP USER IF EXISTS 'MADJ_Web_User'@'%';
          CREATE USER 'MADJ_Web_User'@'%' IDENTIFIED BY 'Password123!';
          GRANT ALL PRIVILEGES ON MADJ_App_DB.* TO 'MADJ_Web_User'@'%';
          FLUSH PRIVILEGES;
          FLUSH HOSTS;
          SQL

          # Self-test: can we authenticate as the web user from this box?
          mysql -h 127.0.0.1 -u MADJ_Web_User -pPassword123! -e "SELECT COUNT(*) FROM MADJ_App_DB.cards;"
          SELFTEST=$?

          # Signal CloudFormation only if everything worked
          /opt/aws/bin/cfn-signal -e $SELFTEST --stack ${AWS::StackName} --resource DatabaseServer --region ${AWS::Region}
      Tags:
        - Key: Name
          Value: DatabaseServer

  WebServer:
    Type: AWS::EC2::Instance
    DependsOn: DatabaseServer
    CreationPolicy:
      ResourceSignal:
        Timeout: PT10M
    Properties:
      ImageId: ami-0c02fb55956c7d316
      InstanceType: t2.micro
      KeyName: !Ref KeyName
      SubnetId: !Ref MADJPublicSubnet
      SecurityGroupIds:
        - !Ref MADJWebSG
      UserData:
        Fn::Base64: !Sub
          - |
            #!/bin/bash
            exec > /var/log/user-data.log 2>&1
            set -x

            yum update -y
            yum install -y httpd php php-mysqlnd mariadb
            systemctl enable httpd

            # DB is guaranteed ready because DatabaseServer's CreationPolicy
            # already blocked until its own self-test passed. But verify once
            # more to be safe.
            mysql -h ${DBHost} -u MADJ_Web_User -pPassword123! -e "SELECT 1" MADJ_App_DB
            DBCHECK=$?

            cat > /var/www/html/index.php <<'PHPEOF'
            <?php
            error_reporting(E_ALL);
            ini_set('display_errors', 1);
            $conn = new mysqli("__DBHOST__", "MADJ_Web_User", "Password123!", "MADJ_App_DB");
            if ($conn->connect_error) {
                die("Connection failed: " . $conn->connect_error);
            }
            $result = $conn->query("SELECT * FROM cards");
            ?>
            <!DOCTYPE html>
            <html>
            <head>
                <title>Manny's Card Shop</title>
                <style>
                    body { font-family: Arial; background-color: #f4f4f4; text-align: center; }
                    h1 { background-color: #333; color: white; padding: 15px; }
                    table { margin: auto; border-collapse: collapse; width: 60%; background: white; }
                    th, td { padding: 10px; border: 1px solid #ccc; }
                    th { background-color: #555; color: white; }
                </style>
            </head>
            <body>
            <h1>Manny's Card Shop</h1>
            <table>
            <tr><th>Card Name</th><th>Price ($)</th></tr>
            <?php
            while ($row = $result->fetch_assoc()) {
                echo "<tr><td>{$row['name']}</td><td>{$row['price']}</td></tr>";
            }
            ?>
            </table>
            </body>
            </html>
            PHPEOF
            sed -i "s/__DBHOST__/${DBHost}/" /var/www/html/index.php
            rm -f /var/www/html/index.html
            systemctl start httpd

            # Final check: is httpd actually serving?
            sleep 3
            curl -sf http://localhost/index.php > /dev/null
            HTTPCHECK=$?

            /opt/aws/bin/cfn-signal -e $((DBCHECK + HTTPCHECK)) --stack ${AWS::StackName} --resource WebServer --region ${AWS::Region}
          - DBHost: !GetAtt DatabaseServer.PrivateIp
      Tags:
        - Key: Name
          Value: WebServer

Outputs:
  WebServerURL:
    Description: Open this in a browser to see Manny's shop
    Value: !Sub http://${WebServer.PublicIp}
  DatabasePrivateIP:
    Description: Private IP of the database (not reachable from internet)
    Value: !GetAtt DatabaseServer.PrivateIp