AWSTemplateFormatVersion: '2010-09-09'
Description: MADJ two-tier VPC assignment

Parameters:
  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: Name of my EC2 key pair

Resources:

  # VPC
  MADJVPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: MADJ-VPC

  # Public subnet for the web server
  MADJPublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref MADJVPC
      CidrBlock: 10.0.1.0/24
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: MADJ-Public-Subnet

  # Private subnet for the database
  MADJPrivateSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref MADJVPC
      CidrBlock: 10.0.2.0/24
      Tags:
        - Key: Name
          Value: MADJ-Private-Subnet

  # Internet gateway for the public subnet
  MADJIGW:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: MADJ-IGW

  AttachGateway:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref MADJVPC
      InternetGatewayId: !Ref MADJIGW

  # Elastic IP for the NAT Gateway
  MADJNatEIP:
    Type: AWS::EC2::EIP
    DependsOn: AttachGateway
    Properties:
      Domain: vpc

  # NAT Gateway so private subnet can reach the internet for updates
  MADJNAT:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt MADJNatEIP.AllocationId
      SubnetId: !Ref MADJPublicSubnet
      Tags:
        - Key: Name
          Value: MADJ-NAT

  # Public route table
  MADJPublicRT:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref MADJVPC
      Tags:
        - Key: Name
          Value: MADJ-Public-RT

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: AttachGateway
    Properties:
      RouteTableId: !Ref MADJPublicRT
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref MADJIGW

  PublicSubnetAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref MADJPublicSubnet
      RouteTableId: !Ref MADJPublicRT

  # Private route table (routes through NAT Gateway for outbound only)
  MADJPrivateRT:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref MADJVPC
      Tags:
        - Key: Name
          Value: MADJ-Private-RT

  PrivateRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref MADJPrivateRT
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref MADJNAT

  PrivateSubnetAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref MADJPrivateSubnet
      RouteTableId: !Ref MADJPrivateRT

  # Security group for the web server (open to internet)
  MADJWebSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow HTTP and SSH
      VpcId: !Ref MADJVPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: MADJ-Web-SG

  # Security group for the database (only from web server)
  MADJDBSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Only allow MySQL and SSH from web server
      VpcId: !Ref MADJVPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3306
          ToPort: 3306
          SourceSecurityGroupId: !Ref MADJWebSG
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          SourceSecurityGroupId: !Ref MADJWebSG
      Tags:
        - Key: Name
          Value: MADJ-DB-SG

  # Web server EC2 - installs Apache automatically
  WebServer:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: ami-0c02fb55956c7d316
      InstanceType: t2.micro
      KeyName: !Ref KeyName
      SubnetId: !Ref MADJPublicSubnet
      SecurityGroupIds:
        - !Ref MADJWebSG
      UserData:
        Fn::Base64: |
          #!/bin/bash
          yum update -y
          yum install -y httpd
          systemctl enable httpd
          systemctl start httpd
          echo "<h1>Web tier is up</h1><p>This EC2 is in the public subnet.</p>" > /var/www/html/index.html
      Tags:
        - Key: Name
          Value: WebServer

  # Database EC2 (in the private subnet) - installs MariaDB automatically
  DatabaseServer:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: ami-0c02fb55956c7d316
      InstanceType: t2.micro
      KeyName: !Ref KeyName
      SubnetId: !Ref MADJPrivateSubnet
      SecurityGroupIds:
        - !Ref MADJDBSG
      UserData:
        Fn::Base64: |
          #!/bin/bash
          yum update -y
          yum install -y mariadb-server
          systemctl enable mariadb
          systemctl start mariadb
      Tags:
        - Key: Name
          Value: DatabaseServer

Outputs:
  WebServerIP:
    Description: Public IP of the web server
    Value: !GetAtt WebServer.PublicIp
  DatabasePrivateIP:
    Description: Private IP of the database server
    Value: !GetAtt DatabaseServer.PrivateIp